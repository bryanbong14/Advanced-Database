<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-box">
      <svg viewBox="0 0 22 22" fill="none">
        <rect x="1" y="1" width="8" height="8" rx="2" fill="white"/>
        <rect x="13" y="1" width="8" height="8" rx="2" fill="white" opacity=".7"/>
        <rect x="1" y="13" width="8" height="8" rx="2" fill="white" opacity=".7"/>
        <rect x="13" y="13" width="8" height="8" rx="2" fill="white" opacity=".4"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">DataPortal</div>
      <div class="logo-sub">Management System</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <div class="nav-item active" onclick="showPage('dashboard',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      Dashboard
    </div>

    <div class="nav-label" style="margin-top:6px">Data</div>
    <div class="nav-item" id="nav-customers" onclick="showPage('customers',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="3"/><path d="M1 14c0-3 2.5-5 5-5s5 2 5 5"/><path d="M11 2a3 3 0 0 1 0 6"/><path d="M15 14c0-3-1.5-4.5-4-5"/></svg>
      Customers
    </div>
    <div class="nav-item" id="nav-invoices" onclick="showPage('invoices',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 1h8a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1z"/><path d="M5 5h6M5 8h6M5 11h4"/></svg>
      Invoices
      <span class="nav-badge" id="overdue-badge" style="display:none">!</span>
    </div>
    <div class="nav-item" id="nav-orders" onclick="showPage('orders',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4l1.5-2h9L14 4v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4z"/><path d="M5 7h6M5 10h4"/></svg>
      Sales Orders
    </div>
    <div class="nav-item" id="nav-inventory" onclick="showPage('inventory',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="8" width="14" height="7" rx="1"/><rect x="3" y="4" width="10" height="4" rx="1"/><rect x="5" y="1" width="6" height="3" rx="1"/></svg>
      Inventory
    </div>

    <div class="nav-label" style="margin-top:6px">Reports</div>
    <div class="nav-item" onclick="showPage('reports',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><path d="M4 10l2.5-3 2.5 2 3-4"/></svg>
      Power BI
    </div>

    <div class="nav-label" id="admin-nav-label" style="margin-top:6px;display:none">Admin</div>
    <div class="nav-item hidden" id="nav-users" onclick="showPage('users',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3.5"/><path d="M1 15c0-4 3-6 7-6s7 2 7 6"/></svg>
      User Management
    </div>
    <div class="nav-item hidden" id="nav-sync" onclick="showPage('sync',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 8A6 6 0 0 1 2.5 11M2 8A6 6 0 0 1 13.5 5"/><path d="M14 5v3h-3M2 11v-3h3"/></svg>
      Sync Logs
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="sync-pill">
      <div class="sync-dot"></div>
      <span id="syncStatus">AutoCount not configured</span>
    </div>
    <div class="user-pill" onclick="toggleProfileMenu()">
      <div class="avatar" id="userAvatar">--</div>
      <div style="min-width:0">
        <div class="user-name" id="userName">Loading...</div>
        <div class="user-role" id="userRoleLabel">—</div>
      </div>
    </div>
    <!-- Profile dropdown -->
    <div class="profile-menu" id="profileMenu">
      <div class="profile-menu-item" onclick="showPage('profile',null)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3.5"/><path d="M1 15c0-4 3-6 7-6s7 2 7 6"/></svg>
        My Profile
      </div>
      <div class="profile-menu-item danger" onclick="handleSignOut()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 8h8M11 5l3 3-3 3"/><path d="M6 3H3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h3"/></svg>
        Sign Out
      </div>
    </div>
  </div>
</aside>
